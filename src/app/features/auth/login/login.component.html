<div class="login-bg">

  <div class="login-card">
    <!-- Brand -->
    <div class="login-brand">
      <div class="login-brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
      </div>
      <span class="login-brand-name">Sistema de Gestión</span>
    </div>

    <!-- Header -->
    <div class="login-card-header">
      <h1 class="login-title">Iniciar sesión</h1>
      <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <div class="field-group">
        <label for="username" class="field-label">Usuario</label>
        <input
          id="username"
          type="text"
          name="username"
          [(ngModel)]="username"
          placeholder="Tu nombre de usuario"
          autocomplete="username"
          required
          class="field-input"
        />
      </div>

      <div class="field-group">
        <label for="password" class="field-label">Contraseña</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
          class="field-input"
        />
      </div>

      @if (state().errorMessage) {
        <div class="error-banner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ state().errorMessage }}
        </div>
      }

      <button type="submit" [disabled]="state().isLoading" class="btn-primary login-submit">
        @if (state().isLoading) {
          <span class="loading-spinner"></span>
          Verificando...
        } @else {
          Iniciar sesión
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        }
      </button>
    </form>
  </div>

  <!-- Feature strip (desktop only) -->
  <div class="login-features">
    <span class="lf-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5M12 22V12"/>
      </svg>
      Inventario FIFO y lotes
    </span>
    <span class="lf-sep">·</span>
    <span class="lf-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
        <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
      </svg>
      Ventas y facturación SUNAT
    </span>
    <span class="lf-sep">·</span>
    <span class="lf-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      Caja y finanzas
    </span>
    <span class="lf-sep">·</span>
    <span class="lf-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Equipo y asistencia
    </span>
  </div>

</div>
